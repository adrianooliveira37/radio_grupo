<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fênix PTT3</title>

<meta http-equiv="Content-Security-Policy"
content="default-src 'self' https://server-grupo.onrender.com;
style-src 'self' 'unsafe-inline';
script-src 'self' 'unsafe-inline' https://cdn.socket.io https://unpkg.com;
connect-src 'self' ws: wss: https://server-grupo.onrender.com wss://server-grupo.onrender.com;">

<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #0d0d0f;
  color: white;
}

.header {
  position: fixed;
  top: 0;
  width: 100%;
  background: #16161a;
  padding: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 10;
}

.btn {
  background: #222;
  border: none;
  color: white;
  padding: 6px 10px;
  border-radius: 6px;
}

.main {
  padding: 70px 12px;
}

.card {
  background: #1a1a1f;
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 12px;
}

.ptt-container {
  display: flex;
  justify-content: center;
}

.btn-falar {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  border: none;
  background: #222;
  color: white;
  font-size: 18px;
}

.btn-falar.active {
  background: #00ff88;
  color: black;
  box-shadow: 0 0 20px #00ff88;
}

.status {
  text-align: center;
  margin-top: 10px;
}

.users-modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: none;
}

.users-content {
  position: absolute;
  bottom: 0;
  width: 100%;
  max-height: 70%;
  background: #1a1a1f;
  border-radius: 16px 16px 0 0;
  padding: 10px;
  overflow-y: auto;
}

.user-item {
  padding: 8px;
  margin-bottom: 6px;
  background: #111;
  border-radius: 6px;
}

.user-item.talking {
  background: #003d25;
  border-left: 4px solid #00ff88;
}
</style>
</head>

<body>

<div class="header">
  <span id="txt-room">Sala</span>

  <div>
    <button id="btn-users" class="btn">👥 <span id="count-users">0</span></button>
    <button onclick="sair()" class="btn">Sair</button>
  </div>
</div>

<div class="main">
  <div class="card">
    Conectado como: <b id="txt-name"></b>
  </div>

  <div class="card">
    <div class="ptt-container">
      <button id="btn-falar" class="btn-falar">PTT</button>
    </div>
    <div id="status" class="status">Microfone desligado</div>
  </div>
</div>

<!-- MODAL -->
<div id="users-modal" class="users-modal">
  <div class="users-content">
    <div style="display:flex;justify-content:space-between;">
      <b>Participantes</b>
      <button onclick="toggleUsers()">✕</button>
    </div>
    <div id="users-list"></div>
  </div>
</div>

<div id="audios-container"></div>

<script>
const BACKEND_URL = 'https://server-grupo.onrender.com';

const name = sessionStorage.getItem('radio_name');
const room = sessionStorage.getItem('radio_room');

if (!name || !room) location.href = 'index.html';

document.getElementById('txt-name').innerText = name;
document.getElementById('txt-room').innerText = room;

const socket = io(BACKEND_URL);

let peer;
let localStream;
let myPeerId;

// 🔥 fallback local
let falandoAgora = new Set();

/* PEER */
peer = new Peer(undefined, {
  host: 'server-grupo.onrender.com',
  port: 443,
  path: '/peerjs',
  secure: true
});

peer.on('open', id => {
  myPeerId = id;
  socket.emit('register', { name, room, peerId: id });
});

/* MICROFONE */
navigator.mediaDevices.getUserMedia({ audio: true })
.then(stream => {
  localStream = stream;
  localStream.getAudioTracks()[0].enabled = false;

  peer.on('call', call => {
    call.answer(localStream);
    call.on('stream', s => tocarAudio(call.peer, s));
  });
});

/* PRESENCE (CORRIGIDO) */
socket.on('presence', users => {
  document.getElementById('count-users').innerText = users.length;

  const list = document.getElementById('users-list');
  list.innerHTML = '';

  const ordenados = users.sort((a, b) => {
    const aTalk = a.isTalking || falandoAgora.has(a.peerId);
    const bTalk = b.isTalking || falandoAgora.has(b.peerId);
    return bTalk - aTalk;
  });

  ordenados.forEach(u => {
    const isTalking = u.isTalking || falandoAgora.has(u.peerId);

    const div = document.createElement('div');
    div.className = 'user-item ' + (isTalking ? 'talking' : '');
    div.innerText = u.name + (isTalking ? ' 🎤 Falando' : ' 🤫');

    list.appendChild(div);
  });
});

/* PTT CLICK */
const btn = document.getElementById('btn-falar');
const status = document.getElementById('status');

let isTalking = false;

btn.onclick = () => {
  if (!localStream) return;

  isTalking = !isTalking;
  localStream.getAudioTracks()[0].enabled = isTalking;

  if (isTalking) {
    falandoAgora.add(myPeerId);

    btn.classList.add('active');
    status.innerText = 'Transmitindo...';

    socket.emit('talking_state', { isTalking: true });
    ligar();
  } else {
    falandoAgora.delete(myPeerId);

    btn.classList.remove('active');
    status.innerText = 'Microfone desligado';

    socket.emit('talking_state', { isTalking: false });
  }
};

function ligar() {
  socket.emit('get_active_users', users => {
    users.forEach(u => {
      if (u.peerId !== myPeerId) {
        peer.call(u.peerId, localStream);
      }
    });
  });
}

/* AUDIO */
function tocarAudio(id, stream){
  let a = document.getElementById('a'+id);

  if(!a){
    a = document.createElement('audio');
    a.id = 'a'+id;
    a.autoplay = true;
    document.body.appendChild(a);
  }

  a.srcObject = stream;

  // fallback visual
  falandoAgora.add(id);

  a.onended = () => {
    falandoAgora.delete(id);
  };

  a.play().catch(()=>{});
}

/* MODAL */
const modal = document.getElementById('users-modal');
document.getElementById('btn-users').onclick = toggleUsers;

function toggleUsers(){
  modal.style.display = modal.style.display === 'block' ? 'none':'block';
}

modal.onclick = e=>{
  if(e.target === modal) modal.style.display = 'none';
};

/* SAIR */
function sair(){
  sessionStorage.clear();
  location.href='index.html';
}
</script>

</body>
</html>
