<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fênix PTT</title>

<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0d0d0f;
  color: #fff;
}

/* HEADER FIXO */
.header {
  position: fixed;
  top: 0;
  width: 100%;
  background: #16161a;
  padding: 12px 16px;
  border-bottom: 1px solid #222;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 10;
}

.header h2 {
  font-size: 16px;
  margin: 0;
}

.header span {
  color: #00ff88;
}

.btn-sair {
  background: #ff4d4d;
  border: none;
  padding: 6px 12px;
  border-radius: 6px;
  color: white;
}

/* CONTEÚDO */
.main {
  padding: 70px 12px 20px;
}

/* CARD */
.card {
  background: #1a1a1f;
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 14px;
}

/* LISTA USUÁRIOS */
.user-item {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 8px;
  background: #111;
  font-size: 14px;
}

.user-item.talking {
  background: #002b1a;
  border-left: 4px solid #00ff88;
}

/* BOTÃO PTT (DESTAQUE) */
.ptt-container {
  display: flex;
  justify-content: center;
  margin-top: 20px;
}

.btn-falar {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  border: none;
  background: #222;
  color: white;
  font-size: 18px;
  font-weight: bold;
  box-shadow: 0 0 0 6px #111;
  transition: 0.2s;
}

.btn-falar:active {
  transform: scale(0.95);
}

.btn-falar.active {
  background: #00ff88;
  color: #000;
  box-shadow: 0 0 20px #00ff88;
}

/* TEXTO STATUS */
.status {
  text-align: center;
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.7;
}

/* BOTÃO DESBLOQUEIO AUDIO */
.btn-desbloquear-audio {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #00ff88;
  color: black;
  border: none;
  padding: 12px;
  border-radius: 8px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="header">
  <h2><span id="txt-room">Sala</span></h2>
  <button class="btn-sair" onclick="sair()">Sair</button>
</div>

<div class="main">

  <div class="card">
    <div><b id="txt-name"></b></div>
  </div>

  <div class="card">
    <h3 style="margin-top:0;">Participantes</h3>
    <div id="users-list"></div>
  </div>

  <div class="card">
    <div class="ptt-container">
      <button id="btn-falar" class="btn-falar">PTT</button>
    </div>
    <div id="status" class="status">Microfone desligado</div>
  </div>

</div>

<div id="audios-container"></div>

<script>
const BACKEND_URL = 'https://server-grupo.onrender.com';

const name = sessionStorage.getItem('radio_name');
const room = sessionStorage.getItem('radio_room');

if (!name || !room) {
  window.location.href = 'index.html';
}

document.getElementById('txt-name').innerText = name;
document.getElementById('txt-room').innerText = room;

const socket = io(BACKEND_URL);

let peer;
let localStream;
let myPeerId = null;

peer = new Peer(undefined, {
  host: 'server-grupo.onrender.com',
  port: 443,
  path: '/peerjs',
  secure: true
});

peer.on('open', (id) => {
  myPeerId = id;
  socket.emit('register', { name, room, peerId: id });
});

navigator.mediaDevices.getUserMedia({ audio: true })
.then(stream => {
  localStream = stream;
  localStream.getAudioTracks()[0].enabled = false;

  peer.on('call', call => {
    call.answer(localStream);
    call.on('stream', remoteStream => {
      tocarAudio(call.peer, remoteStream);
    });
  });
});

socket.on('presence', users => {
  const list = document.getElementById('users-list');
  list.innerHTML = '';

  users.forEach(u => {
    const div = document.createElement('div');
    div.className = 'user-item ' + (u.isTalking ? 'talking' : '');
    div.innerHTML = `
      <span>${u.name}</span>
      <span>${u.isTalking ? '🎤' : '—'}</span>
    `;
    list.appendChild(div);
  });
});

const btn = document.getElementById('btn-falar');
const status = document.getElementById('status');

let isTalking = false;

btn.addEventListener('touchstart', startTalk);
btn.addEventListener('mousedown', startTalk);

btn.addEventListener('touchend', stopTalk);
btn.addEventListener('mouseup', stopTalk);

function startTalk() {
  if (!localStream) return;

  isTalking = true;
  localStream.getAudioTracks()[0].enabled = true;

  btn.classList.add('active');
  status.innerText = 'Transmitindo...';

  socket.emit('talking_state', { isTalking: true });
  ligarParaTodos();
}

function stopTalk() {
  if (!localStream) return;

  isTalking = false;
  localStream.getAudioTracks()[0].enabled = false;

  btn.classList.remove('active');
  status.innerText = 'Microfone desligado';

  socket.emit('talking_state', { isTalking: false });
}

function ligarParaTodos() {
  socket.emit('get_active_users', users => {
    users.forEach(u => {
      if (u.peerId !== myPeerId) {
        peer.call(u.peerId, localStream);
      }
    });
  });
}

function tocarAudio(peerId, stream) {
  let audio = document.getElementById(`audio-${peerId}`);

  if (!audio) {
    audio = document.createElement('audio');
    audio.id = `audio-${peerId}`;
    audio.autoplay = true;
    document.body.appendChild(audio);
  }

  audio.srcObject = stream;

  audio.play().catch(() => {
    if (!document.getElementById('btn-unmute')) {
      const btn = document.createElement('button');
      btn.id = 'btn-unmute';
      btn.className = 'btn-desbloquear-audio';
      btn.innerText = "Ativar áudio";

      btn.onclick = () => {
        document.querySelectorAll('audio').forEach(a => a.play());
        btn.remove();
      };

      document.body.appendChild(btn);
    }
  });
}

function sair() {
  sessionStorage.clear();
  window.location.href = 'index.html';
}
</script>

</body>
</html>
